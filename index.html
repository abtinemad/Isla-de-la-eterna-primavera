<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Grand Tenerife Auto : Isla Primavera</title>
    <meta name="description" content="Compagnon de route HUD pour Tenerife : missions, safehouses, ravitaillement et trophées." />

    <!-- Boot splash artwork — préchargé pour un affichage instantané -->
    <link rel="preload" as="image" href="/assets/splash.webp" />

    <!-- Fonts : Space Grotesk (display), Inter (body), JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <!-- Splash GTA VI : Oswald (labels) + Barlow Semi Condensed (corps) -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B0C10" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GTA IP" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
